version: '3.8'

# Chronicle Weaver Backend - Docker Compose Configuration
# Optimized for cluster deployment and Portainer integration
# 
# Usage:
#   - Docker Compose: docker-compose up -d (uses bridge network)
#   - Portainer/Swarm: Deploy as stack - automatically uses overlay network
#   - Docker Swarm: Use docker-stack.yml instead

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: chronicle-weaver-backend:latest
    hostname: chronicle-weaver-backend
    ports:
      - "8082:8080"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8080
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL:-gpt-4}
      - AI_HANDLER_URL=${AI_HANDLER_URL:-http://backend:8080/ai}
    # env_file:
    #   - ./backend/.env  # Optional: Uncomment if using .env file (not needed for Portainer)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend-network
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        # Constraints: Uncomment to distribute across nodes
        # constraints:
        #   - "node.role == worker"
        constraints: []
        preferences:
          # Spread replicas across available nodes
          - spread: node.id
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      labels:
        # Portainer labels for better UI organization
        - "com.portainer.stack.name=chronicle-weaver"
        - "com.portainer.stack.description=Chronicle Weaver Backend API Service"
        - "com.portainer.stack.category=backend"
        - "com.portainer.stack.technology=docker-compose"
        
        # Application metadata
        - "com.chronicle-weaver.service=backend"
        - "com.chronicle-weaver.version=1.0.0"
        - "com.chronicle-weaver.component=api"
        - "com.chronicle-weaver.managed-by=portainer"
        
        # Health check labels for Portainer monitoring
        - "traefik.enable=false"
        - "com.docker.compose.service=backend"
        
        # Documentation links
        - "com.chronicle-weaver.docs=https://github.com/duketopceo/rork-chronicle-weaver"
        - "com.chronicle-weaver.support=backend/DOCKER_README.md"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,environment"
    # volumes:
      # Optional: Mount logs directory if needed
      # - ./logs:/app/logs:rw
      # Optional: Mount config if needed
      # - ./config:/app/config:ro

networks:
  backend-network:
    driver: overlay
    attachable: true
    # Let Swarm auto-generate network name to avoid conflicts
    labels:
      - "com.portainer.stack.name=chronicle-weaver"
      - "com.chronicle-weaver.network=backend"

# Optional: Add volumes for persistent data if needed
# volumes:
#   backend-logs:
#     driver: local
#     name: chronicle-weaver-logs
